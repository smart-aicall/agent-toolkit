<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="16" />

  <!-- Abstract Network / Voice Waves -->
  <g opacity="0.6">
    <path d="M-100 250 Q 200 150 400 250 T 900 200 T 1300 250" fill="none" stroke="url(#waveGrad)" stroke-width="4" filter="url(#glow)"/>
    <path d="M-100 280 Q 300 200 600 280 T 1300 200" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.5"/>

    <!-- Nodes representing Agent and Workers -->
    <circle cx="200" cy="190" r="4" fill="#60a5fa" filter="url(#glow)"/>
    <circle cx="400" cy="250" r="6" fill="#a78bfa" filter="url(#glow)"/>
    <circle cx="650" cy="230" r="5" fill="#34d399" filter="url(#glow)"/>
    <circle cx="900" cy="200" r="8" fill="#f472b6" filter="url(#glow)"/>

    <!-- Soundwave bars on the right -->
    <g transform="translate(1000, 100)">
      <rect x="0" y="40" width="8" height="20" rx="4" fill="#8b5cf6" opacity="0.6"><animate attributeName="height" values="20;50;20" dur="1s" repeatCount="indefinite"/></rect>
      <rect x="20" y="20" width="8" height="60" rx="4" fill="#8b5cf6" opacity="0.8"><animate attributeName="height" values="60;30;60" dur="1.2s" repeatCount="indefinite"/></rect>
      <rect x="40" y="10" width="8" height="80" rx="4" fill="#3b82f6" opacity="1"><animate attributeName="height" values="80;40;80" dur="0.8s" repeatCount="indefinite"/></rect>
      <rect x="60" y="30" width="8" height="40" rx="4" fill="#3b82f6" opacity="0.8"><animate attributeName="height" values="40;70;40" dur="1.5s" repeatCount="indefinite"/></rect>
      <rect x="80" y="45" width="8" height="10" rx="4" fill="#60a5fa" opacity="0.6"><animate attributeName="height" values="10;30;10" dur="0.9s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <!-- Title -->
  <text x="80" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="1">
    事半AI Agent Toolkit
  </text>

  <!-- Subtitle -->
  <text x="82" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">
    让你的 AI Agent 拥有一支<tspan fill="#60a5fa" font-weight="600">会思考、会说话、能成交</tspan>的数字员工团队
  </text>

  <!-- MCP Server Badge -->
  <g transform="translate(82, 220)">
    <rect width="130" height="32" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="16" y="21" font-family="sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">MCP Server</text>
  </g>
  <!-- Claude Skill Badge -->
  <g transform="translate(225, 220)">
    <rect width="120" height="32" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="16" y="21" font-family="sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Claude Skill</text>
  </g>
</svg>
